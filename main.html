<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="./css/middle.css">
    <style>

        .container {
            height: 100%;
            width: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .profile {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: row;
        }

        .picture {
            background-image: url('avatar.jpg');
            background-size: cover;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin: 0 auto 10px;
            background-color: #3981e5;
        }

        .name {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #333;
        }

        .menu {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu_button {
            width: calc(100% - 40px);
            padding: 20px;
            margin: 10px;
            color: white;
            background-color: #3981e5;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 2px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .menu_button.call {
            background-color: #ccc;
        }
        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: red;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="profile">
            <div class="picture"></div>
            <div class="name">김다영 선생님<br>간호사</div>
        </div>

        <div class="menu">
            <button class="menu_button" onclick="location.href='send.html'">메세지 보내기</button>
            <button class="menu_button">받은 메세지<span class="badge">2</span></button>
            <button class="menu_button call">문의사항</button>
        </div>
    </div>


</body>

</html>
